[tool.pytest.ini_options]
testpaths = ["tests"]
addopts = "-v"
pythonpath = ["."]

[tool.ruff]
target-version = "py311"
line-length = 88
exclude = [
    ".venv",
    "__pycache__",
    "*.pyi",
]

[tool.ruff.lint]
select = [
    "E",    # pycodestyle errors
    "W",    # pycodestyle warnings
    "F",    # pyflakes (undefined names, unused imports)
    "I",    # isort (import ordering)
    "UP",   # pyupgrade (modernise syntax for target Python version)
    "B",    # flake8-bugbear (common bugs and design issues)
    "C4",   # flake8-comprehensions (cleaner list/dict/set comprehensions)
    "SIM",  # flake8-simplify (remove redundant constructs)
    "RUF",  # Ruff-native rules
]
ignore = [
    "E501",  # line too long — enforced by the formatter instead
    "B008",  # function call in default argument — required by FastAPI Depends()
]

[tool.ruff.lint.per-file-ignores]
"backend/**/*.py" = ["ALL"]   # legacy directory, not actively maintained

[tool.ruff.lint.isort]
known-first-party = ["src", "etl", "jobs"]
split-on-trailing-comma = true

[tool.ruff.format]
quote-style = "double"
indent-style = "space"
line-ending = "auto"

networks:
  smartvisit_net:
    driver: bridge

volumes:
  mongodb_data:
  neo4j_data:
  neo4j_logs:
  grafana_data:
  spark_logs:

services:
  # ── Databases ───────────────────────────────────────────────────

  mongodb:
    image: mongo:7
    container_name: smartvisit_mongodb
    ports:
      - "27017:27017"
    volumes:
      - mongodb_data:/data/db
    networks:
      - smartvisit_net
    healthcheck:
      test: ["CMD", "mongosh", "--eval", "db.adminCommand('ping')"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 20s
    restart: unless-stopped

  neo4j:
    image: neo4j:5
    container_name: smartvisit_neo4j
    ports:
      - "7474:7474"
      - "7687:7687"
    environment:
      # NEO4J_AUTH must match NEO4J_USER/NEO4J_PASSWORD in .env
      - NEO4J_AUTH=${NEO4J_USER}/${NEO4J_PASSWORD}
      - NEO4J_PLUGINS=["apoc"]
      - NEO4J_dbms_security_procedures_unrestricted=apoc.*
    volumes:
      - neo4j_data:/data
      - neo4j_logs:/logs
    networks:
      - smartvisit_net
    healthcheck:
      test: ["CMD", "neo4j", "status"]
      interval: 15s
      timeout: 10s
      retries: 10
      start_period: 60s
    restart: unless-stopped

  redis:
    image: redis:7-alpine
    container_name: smartvisit_redis
    ports:
      - "6379:6379"
    command: redis-server --save 60 1 --loglevel warning
    networks:
      - smartvisit_net
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 3s
      retries: 5
      start_period: 10s
    restart: unless-stopped

  # ── Big Data ────────────────────────────────────────────────────

  spark-master:
    image: apache/spark:3.5.1
    container_name: smartvisit_spark_master
    ports:
      - "8080:8080"
      - "7077:7077"
    volumes:
      - ./etl:/app/etl
      - ./jobs:/app/jobs
      - ./data:/app/data
      - spark_logs:/opt/spark/logs
    networks:
      - smartvisit_net
    command: >
      /opt/spark/bin/spark-class
      org.apache.spark.deploy.master.Master
      --host 0.0.0.0
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:8080 || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 30s
    restart: unless-stopped

  spark-worker:
    image: apache/spark:3.5.1
    container_name: smartvisit_spark_worker
    ports:
      - "8081:8081"
    volumes:
      - ./etl:/app/etl
      - ./jobs:/app/jobs
      - ./data:/app/data
      - spark_logs:/opt/spark/logs
    networks:
      - smartvisit_net
    depends_on:
      spark-master:
        condition: service_healthy
    command: >
      /opt/spark/bin/spark-class
      org.apache.spark.deploy.worker.Worker
      spark://spark-master:7077
    restart: unless-stopped

  # ── Backend API ─────────────────────────────────────────────────

  api:
    build:
      context: .
      dockerfile: docker/api/Dockerfile
    container_name: smartvisit_api
    ports:
      - "8005:8000"
    volumes:
      - ./src:/app/src
      - ./data:/app/data
    env_file:
      - .env
    networks:
      - smartvisit_net
    depends_on:
      mongodb:
        condition: service_healthy
      neo4j:
        condition: service_healthy
      redis:
        condition: service_healthy
    command: uvicorn src.api.main:app --host 0.0.0.0 --port 8000 --reload
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 15s
    restart: unless-stopped

  # ── Dashboard ───────────────────────────────────────────────────

  dashboard:
    build:
      context: .
      dockerfile: docker/dashboard/Dockerfile
    container_name: smartvisit_dashboard
    ports:
      - "8501:8501"
    volumes:
      - ./src:/app/src
      - ./data:/app/data
    env_file:
      - .env
    networks:
      - smartvisit_net
    depends_on:
      api:
        condition: service_healthy
    command: streamlit run src/dashboard/app.py --server.address=0.0.0.0 --server.port=8501
    restart: unless-stopped

  # ── Observability ───────────────────────────────────────────────

  prometheus:
    image: prom/prometheus:latest
    container_name: smartvisit_prometheus
    ports:
      - "9095:9090"
    volumes:
      - ./docker/prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
    networks:
      - smartvisit_net
    depends_on:
      api:
        condition: service_healthy
    restart: unless-stopped

  grafana:
    image: grafana/grafana:latest
    container_name: smartvisit_grafana
    ports:
      - "3000:3000"
    environment:
      - GF_SECURITY_ADMIN_PASSWORD=${GRAFANA_ADMIN_PASSWORD:-admin}
      - GF_USERS_ALLOW_SIGN_UP=false
    volumes:
      - grafana_data:/var/lib/grafana
    networks:
      - smartvisit_net
    depends_on:
      - prometheus
    restart: unless-stopped
